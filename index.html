<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
  </head>
  <body>
    <h1>Welcome to My Website!</h1>
    <p>Hello! My name is Jack Lee and this is my first website.</p>
    <h2>About Me</h2>
    <p>I am learning web development at the University of York.</p>
    <h2>My Interests</h2>
    <ul>
      <li>Web Development</li>
      <li>Computer Science</li>
      <li>Technology</li>
    </ul>
    <!-- Contact Form — paste into your HTML where you want the form -->
<section id="contact">
  <h2>Get In Touch</h2>
  <form id="contact-form">
    <div>
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required
             placeholder="Jane Smith" />
    </div>
    <div>
      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required
             placeholder="jane@example.com" />
    </div>
    <div>
      <label for="message">Message</label>
      <textarea id="message" name="message" required
                placeholder="Say hello..." rows="5"></textarea>
    </div>
    <button type="submit" id="submit-btn">Send Message</button>
    <p id="form-status"></p>
  </form>
</section>
</body>
<script>
  // ── Supabase config ─────────────────────────────────────────────
  // Replace these two values with YOUR project URL and anon key
  const SUPABASE_URL  = "https://qmfwuvzpkdtvdikavcmo.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZnd1dnpwa2R0dmRpa2F2Y21vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjUxMDQsImV4cCI6MjA4ODY0MTEwNH0.dmQO3vud6X8jx8vYKOpXCdBnJKiiyB5CDtSCe9odY6E";
 
  // ── Form submission handler ──────────────────────────────────────
  document.getElementById("contact-form")
    .addEventListener("submit", async function (event) {
 
      // Prevent the default browser form submission (page reload)
      event.preventDefault();
 
      // Grab the form values
      const name    = document.getElementById("name").value.trim();
      const email   = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const btn     = document.getElementById("submit-btn");
      const status  = document.getElementById("form-status");
 
      // Disable the button while we send (prevents double-submit)
      btn.disabled = true;
      btn.textContent = "Sending...";
      status.textContent = "";
 
      try {
        // Call the Supabase REST API to insert a row
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/contact_messages`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey":        SUPABASE_ANON,
              "Authorization": `Bearer ${SUPABASE_ANON}`,
              "Prefer":        "return=minimal"
            },
            body: JSON.stringify({ name, email, message })
          }
        );
 
        if (response.ok) {
          // Success — show confirmation and reset the form
          status.textContent = "✓ Message sent! I will be in touch soon.";
          status.style.color = "#1A7A4A";
          event.target.reset();
        } else {
          // Supabase returned an error — log it for debugging
          const err = await response.json();
          console.error("Supabase error:", err);
          status.textContent = "Something went wrong. Please try again.";
          status.style.color = "#DC2626";
        }
 
      } catch (networkError) {
        // Network/connectivity problem
        console.error("Network error:", networkError);
        status.textContent = "Could not connect. Check your internet connection.";
        status.style.color = "#DC2626";
      } finally {
        // Always re-enable the button
        btn.disabled = false;
        btn.textContent = "Send Message";
      }
    });
</script>




</html>
