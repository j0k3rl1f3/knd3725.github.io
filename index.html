<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
  </head>
  <body>
    <h1>Welcome to My Website!</h1>
    <p>Hello! My name is Jack Lee and this is my first website.</p>
    <h2>About Me</h2>
    <p>I am learning web development at the University of York.</p>
    <h2>My Interests</h2>
    <ul>
      <li>Web Development</li>
      <li>Computer Science</li>
      <li>Technology</li>
    </ul>
    <!-- Contact Form — paste into your HTML where you want the form -->
<section id="contact">
  <h2>Get In Touch</h2>
  <form id="contact-form">
    <div>
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required
             placeholder="Jane Smith" />
    </div>
    <div>
      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required
             placeholder="jane@example.com" />
    </div>
    <div>
      <label for="message">Message</label>
      <textarea id="message" name="message" required
                placeholder="Say hello..." rows="5"></textarea>
    </div>
    <button type="submit" id="submit-btn">Send Message</button>
    <p id="form-status"></p>
  </form>
</section>


  </body>
</html>
